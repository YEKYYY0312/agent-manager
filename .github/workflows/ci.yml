name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  python:
    name: Python SDK and CLI
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run release guardrails
        run: python scripts/check_release_guardrails.py
      - name: Run Python tests
        run: python -m pytest

  web:
    name: Web UI
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/web-ui/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org/
      - name: Audit dependencies
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org/
      - name: Run data tests
        run: npm run test:data
      - name: Run lint
        run: npm run lint
      - name: Build
        run: npm run build
