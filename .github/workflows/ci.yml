name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  python:
    name: Python SDK and CLI
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run release guardrails
        run: python scripts/check_release_guardrails.py
      - name: Run Python tests
        run: python -m pytest

  package-smoke:
    name: Isolated package install
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install through pipx
        run: |
          python -m pip install pipx
          export PIPX_BIN_DIR="$RUNNER_TEMP/pipx-bin"
          echo "$PIPX_BIN_DIR" >> "$GITHUB_PATH"
          python -m pipx install .
      - name: Initialize isolated workspace
        run: |
          agent-devtools init --root "$RUNNER_TEMP/agent-devtools-workspace"
          agent-devtools doctor --root "$RUNNER_TEMP/agent-devtools-workspace"

  quality-gate:
    name: Trace regression and evaluation gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Verify regression command and baseline contract
        run: python packages/cli/agent_devtools_cli/main.py regression-check traces/16ae325515be.trace.json traces/16ae325515be.trace.json --json
      - name: Evaluate quality smoke dataset
        run: python packages/cli/agent_devtools_cli/main.py evaluate eval/ci-smoke-dataset.json eval/ci-smoke-answers.json --output evaluation-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: evaluation-report.json

  web:
    name: Web UI
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/web-ui/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org/
      - name: Audit dependencies
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org/
      - name: Run data tests
        run: npm run test:data
      - name: Run lint
        run: npm run lint
      - name: Build
        run: npm run build

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/typescript-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/typescript-sdk/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org/
      - name: Run tests
        run: npm test
      - name: Build declarations
        run: npm run build
